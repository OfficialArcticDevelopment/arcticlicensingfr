<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Product Details</title><link rel="stylesheet" href="../assets/css/style.css"></head><body><header class="topbar"><a class="logo" href="../index.html">Atlas <span>Product Hub</span></a><nav class="nav"><a href="index.html">Products</a><a href="../login.html">Login</a></nav></header><main class="hero"><section id="details"></section><section class="hero-panel"><h2>License Protected</h2><p class="muted">This product can verify customer license keys through <span class="code">POST /api/license/verify</span>.</p><pre class="card code">{ license_key, product_id, domain, ip, version }</pre></section></main><script src="../assets/js/config.js"></script><script>document.addEventListener('DOMContentLoaded',async()=>{const slug=new URLSearchParams(location.search).get('slug');const {product:p}=await api('/api/products/'+slug);document.querySelector('#details').innerHTML=`<span class="badge">${p.category}</span><h1>${p.name}</h1><p class="lead">${p.description||p.short_description}</p><div class="price">${money(p.price_cents)}</div><div class="actions"><a class="btn primary" href="../register.html">Create Account To Purchase</a><a class="btn" href="index.html">Back</a></div>`})</script></body></html>
