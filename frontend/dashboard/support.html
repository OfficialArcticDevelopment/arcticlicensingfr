<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Support</title><link rel="stylesheet" href="../assets/css/style.css"></head><body><div class="layout"><aside class="sidebar"><a class="side-logo" href="../index.html">Atlas <span class="accent">Hub</span></a><nav class="side-nav"><a href="index.html">Dashboard</a><a href="licenses.html">My Licenses</a><a href="downloads.html">Downloads</a><a class="active" href="support.html">Support</a><a onclick="logout()">Logout</a></nav></aside><main class="main"><div class="welcome"><h1>Support</h1><p class="muted">Open a ticket for license, download, or setup help.</p></div><form id="supportForm" class="card form"><input class="input" name="subject" placeholder="Subject" required><select name="priority"><option>normal</option><option>high</option><option>urgent</option></select><textarea name="message" rows="8" placeholder="How can we help?" required></textarea><button class="btn primary">Open Ticket</button></form></main></div><script src="../assets/js/config.js"></script><script>guard();document.querySelector('#supportForm').addEventListener('submit',async e=>{e.preventDefault();await api('/api/customer/support',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target).entries()))});toast('Ticket opened');e.target.reset()})</script></body></html>
