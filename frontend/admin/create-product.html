<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Product</title><link rel="stylesheet" href="../assets/css/style.css"></head><body><main class="auth"><form id="productForm" class="card auth-card form"><h1>Create Product</h1><input class="input" name="id" placeholder="product-id" required><input class="input" name="name" placeholder="Name" required><input class="input" name="slug" placeholder="slug" required><input class="input" name="category" placeholder="Category"><input class="input" name="type" placeholder="Type"><input class="input" name="price_cents" type="number" placeholder="7999"><input class="input" name="image_url" placeholder="Image URL"><input class="input" name="version" value="1.0.0"><textarea name="short_description" placeholder="Short description"></textarea><textarea name="description" placeholder="Full description"></textarea><button class="btn primary">Create</button></form></main><script src="../assets/js/config.js"></script><script>guard('admin');document.querySelector('#productForm').addEventListener('submit',async e=>{e.preventDefault();await api('/api/admin/products',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target).entries()))});toast('Product created')})</script></body></html>
